<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CenterLine Selector</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel__header">
        <p class="eyebrow">Chrome Extension</p>
        <h1>CenterLine</h1>
        <p class="subtitle">
          Draw a box, confirm it, and pin the midpoint with a dot or crosshair.
        </p>
      </header>

      <section class="selection-card" aria-label="Area selector controls">
        <div class="selection-actions">
          <button
            id="startSelection"
            class="button button--primary"
            type="button"
          >
            Start Selection
          </button>
          <button
            id="useSavedSelection"
            class="button button--secondary"
            type="button"
          >
            Use Saved Selection
          </button>
        </div>

        <button
          id="clearMarker"
          class="button button--secondary button--full"
          type="button"
        >
          Clear Marker
        </button>

        <p id="savedSelectionInfo" class="selection-note" data-empty="true">
          No saved selection yet. Confirm a selection once and reuse it later.
        </p>
      </section>

      <section class="preview-card" aria-label="Marker preview">
        <div class="preview-stage" id="previewStage" data-mode="dot">
          <div class="preview-selection">
            <div class="preview-line preview-line--horizontal"></div>
            <div class="preview-line preview-line--vertical"></div>
            <div class="preview-dot"></div>
          </div>
        </div>
      </section>

      <form id="settingsForm" class="settings-form">
        <label class="field">
          <span>Marker style</span>
          <select id="markerMode" name="markerMode">
            <option value="dot">Dot only</option>
            <option value="crosshair">Crosshair only</option>
          </select>
        </label>

        <label class="field field--color">
          <span>Color</span>
          <select id="color" name="color">
            <option value="#d62828">Red</option>
            <option value="#f4c430">Yellow</option>
            <option value="#2563eb">Blue</option>
            <option value="#2f9e44">Green</option>
            <option value="#7c3aed">Purple</option>
            <option value="#111111">Black</option>
            <option value="#ffffff">White</option>
          </select>
        </label>

        <label class="field">
          <span>Opacity</span>
          <div class="range-row">
            <input
              id="opacity"
              name="opacity"
              type="range"
              min="0.1"
              max="1"
              step="0.05"
            />
            <output id="opacityValue" for="opacity"></output>
          </div>
        </label>

        <label class="field">
          <span>Marker size</span>
          <div class="range-row">
            <input
              id="size"
              name="size"
              type="range"
              min="2"
              max="24"
              step="1"
            />
            <output id="sizeValue" for="size"></output>
          </div>
        </label>
      </form>

      <button id="resetDefaults" class="button-link" type="button">
        Reset defaults
      </button>

      <p class="note">
        Chrome blocks extensions on internal pages, including chrome:// tabs and
        the Chrome Web Store.
      </p>
      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="extension-api.js"></script>
    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
